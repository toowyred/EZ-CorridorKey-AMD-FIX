name: Fresh Install Smoke

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/fresh-install-smoke.yml"
      - "1-install.bat"
      - "1-install.sh"
      - "Install_CorridorKey_Windows.bat"
      - "Install_GVM_Windows.bat"
      - "Install_VideoMaMa_Windows.bat"
      - "2-start.bat"
      - "2-start.sh"
      - "3-update.bat"
      - "3-update.sh"
      - ".gitattributes"
      - "pyproject.toml"
      - "requirements.txt"
      - "scripts/detect_windows_torch_index.py"
      - "scripts/setup_models.py"
      - "scripts/ci_smoke.py"
      - "scripts/test_cuda_detect.bat"
      - "main.py"
      - "backend/**"
      - "tests/test_windows_cuda_detect.py"
      - "ui/**"

jobs:
  smoke:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    env:
      CORRIDORKEY_INSTALL_SAM2: y
      CORRIDORKEY_PREDOWNLOAD_SAM2: y
      CORRIDORKEY_INSTALL_GVM: n
      CORRIDORKEY_INSTALL_VIDEOMAMA: n
      CORRIDORKEY_CREATE_SHORTCUT: n
      CORRIDORKEY_INSTALL_FFMPEG: y

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Ubuntu Qt runtime libraries
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 \
            libgl1 \
            libopengl0 \
            libpulse0 \
            libxkbcommon-x11-0 \
            libxcb-cursor0

      - name: Ensure CRLF in batch files (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          foreach ($f in Get-ChildItem -Recurse -Filter *.bat) {
            $text = [IO.File]::ReadAllText($f.FullName)
            if ($text -match "`n" -and $text -notmatch "`r`n") {
              $text = $text -replace "`n", "`r`n"
              [IO.File]::WriteAllText($f.FullName, $text)
              Write-Host "Fixed CRLF: $($f.Name)"
            }
          }

      - name: CUDA detection parser tests
        shell: bash
        run: |
          pip install pytest
          python -m pytest tests/test_windows_cuda_detect.py -q --noconftest

      - name: CUDA detection locale smoke test (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: call scripts\test_cuda_detect.bat

      - name: Run Windows installer
        if: runner.os == 'Windows'
        shell: cmd
        run: 1-install.bat

      - name: Run Unix installer
        if: runner.os != 'Windows'
        shell: bash
        run: |
          chmod +x 1-install.sh
          ./1-install.sh

      - name: Check installed model status (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: .venv\Scripts\python.exe scripts\setup_models.py --check

      - name: Check installed model status (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: .venv/bin/python scripts/setup_models.py --check

      - name: Set up git branch for updater test
        shell: bash
        run: |
          git checkout -B main
          git branch --set-upstream-to=origin/main main 2>/dev/null || true

      - name: Run updater (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: 3-update.bat

      - name: Run updater (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          chmod +x 3-update.sh
          ./3-update.sh

      - name: Verify start script exists (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          if not exist "2-start.bat" exit /b 1
          echo [OK] 2-start.bat present

      - name: Verify start script exists (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          test -f 2-start.sh || exit 1
          echo "[OK] 2-start.sh present"

      - name: Cross-platform update launcher test
        shell: bash
        run: |
          pip install pytest
          python -m pytest tests/test_run_update_xplat.py -v --noconftest

      - name: Headless startup smoke (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        env:
          CORRIDORKEY_SKIP_STARTUP_DIAGNOSTICS: "1"
          CORRIDORKEY_SKIP_UPDATE_CHECK: "1"
        run: .venv\Scripts\python.exe scripts\ci_smoke.py

      - name: Headless startup smoke (Unix)
        if: runner.os != 'Windows'
        shell: bash
        env:
          CORRIDORKEY_SKIP_STARTUP_DIAGNOSTICS: "1"
          CORRIDORKEY_SKIP_UPDATE_CHECK: "1"
        run: .venv/bin/python scripts/ci_smoke.py
