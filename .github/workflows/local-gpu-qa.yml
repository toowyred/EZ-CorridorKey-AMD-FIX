name: Local GPU QA

on:
  workflow_dispatch:
    inputs:
      sam2_model:
        description: SAM2 checkpoint to test
        required: true
        default: base-plus
        type: choice
        options:
          - base-plus
          - small
          - large
      frames:
        description: Synthetic fixture frame count
        required: true
        default: "8"
        type: string
      chunk_size:
        description: VideoMaMa chunk size
        required: true
        default: "8"
        type: string

jobs:
  gpu-qa:
    name: GPU QA (${{ inputs.sam2_model }})
    runs-on:
      - self-hosted
      - windows
      - x64
      - nvidia
      - corridorkey-gpu
    timeout-minutes: 180

    env:
      CORRIDORKEY_INSTALL_SAM2: y
      CORRIDORKEY_PREDOWNLOAD_SAM2: y
      CORRIDORKEY_INSTALL_GVM: n
      CORRIDORKEY_INSTALL_VIDEOMAMA: y
      CORRIDORKEY_CREATE_SHORTCUT: n
      CORRIDORKEY_SKIP_STARTUP_DIAGNOSTICS: "1"
      CORRIDORKEY_SKIP_UPDATE_CHECK: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Run Windows installer
        shell: cmd
        run: call 1-install.bat

      - name: Ensure QA models are cached
        shell: cmd
        run: |
          .venv\Scripts\python.exe scripts\setup_models.py --sam2 ${{ inputs.sam2_model }}
          .venv\Scripts\python.exe scripts\setup_models.py --videomama
          .venv\Scripts\python.exe scripts\setup_models.py --check

      - name: Run local GPU QA harness
        shell: cmd
        run: |
          if not exist .tmp mkdir .tmp
          .venv\Scripts\python.exe scripts\local_gpu_qa.py --frames ${{ inputs.frames }} --chunk-size ${{ inputs.chunk_size }} --sam2-model ${{ inputs.sam2_model }} --json-out logs\gpu-qa-summary.json --keep-dir .tmp\gpu-qa > .tmp\gpu-qa-run.log 2>&1
          set QA_EXIT=%ERRORLEVEL%
          type .tmp\gpu-qa-run.log
          exit /b %QA_EXIT%

      - name: Upload GPU QA artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gpu-qa-${{ github.run_id }}-${{ inputs.sam2_model }}
          if-no-files-found: warn
          path: |
            .tmp/gpu-qa
            .tmp/gpu-qa-run.log
            logs/gpu-qa-summary.json
