name: Upgrade Smoke

on:
  workflow_dispatch:
    inputs:
      target_ref:
        description: Branch to upgrade to
        required: true
        default: mat-anyone
        type: string

jobs:
  upgrade:
    name: ${{ matrix.os }} • ${{ matrix.from_ref }} -> ${{ inputs.target_ref }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        from_ref: [v1.5.0, v1.5.2]

    env:
      CORRIDORKEY_INSTALL_SAM2: n
      CORRIDORKEY_PREDOWNLOAD_SAM2: n
      CORRIDORKEY_INSTALL_GVM: n
      CORRIDORKEY_INSTALL_VIDEOMAMA: n
      CORRIDORKEY_CREATE_SHORTCUT: n
      CORRIDORKEY_INSTALL_FFMPEG: y
      CORRIDORKEY_SKIP_STARTUP_DIAGNOSTICS: "1"
      CORRIDORKEY_SKIP_UPDATE_CHECK: "1"

    steps:
      - name: Checkout target branch
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ inputs.target_ref }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Ubuntu Qt runtime libraries
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 \
            libgl1 \
            libopengl0 \
            libpulse0 \
            libxkbcommon-x11-0 \
            libxcb-cursor0

      - name: Ensure CRLF in batch files (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          foreach ($f in Get-ChildItem -Recurse -Filter *.bat) {
            $text = [IO.File]::ReadAllText($f.FullName)
            if ($text -match "`n" -and $text -notmatch "`r`n") {
              $text = $text -replace "`n", "`r`n"
              [IO.File]::WriteAllText($f.FullName, $text)
              Write-Host "Fixed CRLF: $($f.Name)"
            }
          }

      - name: Prepare upgrade baseline
        shell: bash
        run: |
          set -euo pipefail
          TARGET_SHA="$(git rev-parse HEAD)"
          echo "TARGET_SHA=$TARGET_SHA" >> "$GITHUB_ENV"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config pull.rebase false
          git checkout -B "upgrade-${{ matrix.from_ref }}" "${{ matrix.from_ref }}"
          git branch --set-upstream-to="origin/${{ inputs.target_ref }}" "upgrade-${{ matrix.from_ref }}"
          echo "BASE_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Install from baseline (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: call 1-install.bat

      - name: Install from baseline (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          chmod +x 1-install.sh
          ./1-install.sh

      - name: Run updater (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: call 3-update.bat

      - name: Run updater (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          chmod +x 3-update.sh
          ./3-update.sh

      - name: Verify upgrade landed on target commit
        shell: bash
        run: |
          set -euo pipefail
          git merge-base --is-ancestor "$TARGET_SHA" HEAD
          test "$(git rev-parse HEAD)" != "$BASE_SHA"

      - name: Verify updater launcher logic
        shell: bash
        run: |
          pip install pytest
          python -m pytest tests/test_run_update_xplat.py -q --noconftest

      - name: Headless startup smoke (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: .venv\Scripts\python.exe scripts\ci_smoke.py

      - name: Headless startup smoke (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: .venv/bin/python scripts/ci_smoke.py

      - name: Upload upgrade smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: upgrade-smoke-${{ matrix.os }}-${{ matrix.from_ref }}
          if-no-files-found: warn
          path: |
            logs/
