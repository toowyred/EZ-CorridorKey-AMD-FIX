name: Azure GPU Installer Smoke

on:
  workflow_dispatch:
    inputs:
      repo_ref:
        description: Git ref to test
        required: true
        default: main
        type: string
      matrix_profile:
        description: Test matrix profile
        required: true
        default: issue-cluster-v1
        type: choice
        options:
          - issue-cluster-v1
          - single
      max_parallel:
        description: Max concurrent Azure lanes
        required: true
        default: "5"
        type: string
      windows_regions:
        description: Preferred Windows regions, comma-separated
        required: true
        default: eastus,eastus2,westus2,westus
        type: string
      linux_regions:
        description: Preferred Linux regions, comma-separated
        required: true
        default: eastus,eastus2,westus2,westus
        type: string
      run_windows:
        description: Run the Windows GPU lane in single mode
        required: true
        default: true
        type: boolean
      run_linux:
        description: Run the Linux GPU lane in single mode
        required: true
        default: false
        type: boolean
      windows_size:
        description: Windows GPU VM size
        required: true
        default: Standard_NC4as_T4_v3
        type: string
      linux_size:
        description: Linux GPU VM size
        required: true
        default: Standard_NC4as_T4_v3
        type: string
      windows_python:
        description: Windows Python version for single mode
        required: true
        default: 3.11.9
        type: string
      linux_python:
        description: Linux Python version for single mode
        required: true
        default: "3.10"
        type: string
      max_budget_usd:
        description: Hard total budget cap for the whole workflow
        required: true
        default: "150"
        type: string
      estimate_only:
        description: Print the spend estimate and exit before provisioning
        required: true
        default: false
        type: boolean
      keep_resources:
        description: Keep Azure VMs for debugging
        required: true
        default: false
        type: boolean
      spot:
        description: Use Spot VMs to reduce cost
        required: true
        default: false
        type: boolean

concurrency:
  group: azure-gpu-installer-smoke
  cancel-in-progress: false

jobs:
  build-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build issue-driven matrix
        id: build
        shell: bash
        run: |
          matrix_json="$(python3 scripts/azure/build_smoke_matrix.py \
            --profile "${{ inputs.matrix_profile }}" \
            --windows-size "${{ inputs.windows_size }}" \
            --linux-size "${{ inputs.linux_size }}" \
            --windows-regions "${{ inputs.windows_regions }}" \
            --linux-regions "${{ inputs.linux_regions }}" \
            --windows-python "${{ inputs.windows_python }}" \
            --linux-python "${{ inputs.linux_python }}" \
            --max-budget-usd "${{ inputs.max_budget_usd }}" \
            $([[ "${{ inputs.run_windows }}" == "true" ]] && echo --run-windows) \
            $([[ "${{ inputs.run_linux }}" == "true" ]] && echo --run-linux))"
          echo "matrix=${matrix_json}" >> "$GITHUB_OUTPUT"
          {
            echo "### Planned Azure lanes"
            echo
            MATRIX_JSON="${matrix_json}" python3 - <<'PY'
            import json
            import os
            matrix = json.loads(os.environ["MATRIX_JSON"])
            print("| Lane | OS | Python | VM Size | Regions | Lane Budget USD |")
            print("|---|---|---|---|---|---|")
            for lane in matrix["include"]:
                print(f"| {lane['lane_id']} | {lane['os']} | {lane['python']} | {lane['size']} | {lane['regions']} | {lane['lane_budget_usd']} |")
            PY
          } >> "$GITHUB_STEP_SUMMARY"

  azure-gpu-smoke:
    needs: build-matrix
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      max-parallel: ${{ fromJson(inputs.max_parallel) }}
      matrix: ${{ fromJson(needs.build-matrix.outputs.matrix) }}
    env:
      AZURE_CORE_OUTPUT: none
      AZURE_RESOURCE_GROUP_BASE: corridorkey-ci-rg
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Run Azure GPU installer smoke lane
        shell: bash
        run: |
          chmod +x scripts/azure/cloud_gpu_installer_smoke.sh
          args=(
            --lane-name "${{ matrix.lane_id }}"
            --prefix "${{ matrix.lane_id }}-${{ github.run_id }}-${{ github.run_attempt }}"
            --ref "${{ inputs.repo_ref }}"
            --max-budget-usd "${{ matrix.lane_budget_usd }}"
          )
          if [[ "${{ matrix.os }}" == "windows" ]]; then
            args+=(
              --windows-size "${{ matrix.size }}"
              --windows-regions "${{ matrix.regions }}"
              --windows-python "${{ matrix.python }}"
              --skip-linux
            )
          else
            args+=(
              --linux-size "${{ matrix.size }}"
              --linux-regions "${{ matrix.regions }}"
              --linux-python "${{ matrix.python }}"
              --skip-windows
            )
          fi
          if [[ "${{ inputs.estimate_only }}" == "true" ]]; then
            args+=(--estimate-only)
          fi
          if [[ "${{ inputs.keep_resources }}" == "true" ]]; then
            args+=(--keep-resources)
          fi
          if [[ "${{ inputs.spot }}" == "true" ]]; then
            args+=(--spot)
          fi
          bash scripts/azure/cloud_gpu_installer_smoke.sh "${args[@]}"

      - name: Upload Azure smoke logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: azure-gpu-installer-smoke-${{ matrix.lane_id }}
          if-no-files-found: warn
          path: logs/azure-gpu-installer-smoke/

  summarize:
    if: always()
    needs: [build-matrix, azure-gpu-smoke]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download lane artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: azure-gpu-installer-smoke-*
          path: logs/azure-gpu-installer-smoke-artifacts
          merge-multiple: true

      - name: Render summary table
        shell: bash
        run: |
          mkdir -p logs
          rm -rf logs/azure-gpu-installer-smoke
          if [[ -d logs/azure-gpu-installer-smoke-artifacts ]]; then
            mkdir -p logs/azure-gpu-installer-smoke
            find logs/azure-gpu-installer-smoke-artifacts -mindepth 1 -maxdepth 1 -type d -exec cp -R {} logs/azure-gpu-installer-smoke/ \;
          fi
          python3 scripts/azure/render_smoke_summary.py | tee logs/azure-gpu-installer-summary.md
          {
            echo "### Azure GPU installer smoke results"
            echo
            cat logs/azure-gpu-installer-summary.md
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload aggregated summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: azure-gpu-installer-summary-${{ github.run_id }}
          if-no-files-found: warn
          path: |
            logs/azure-gpu-installer-summary.md
            logs/azure-gpu-installer-smoke/
